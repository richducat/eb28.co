<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HIP Beth Review Evidence</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #152126;
        background: #eef3f4;
      }

      body {
        margin: 0;
        padding: 32px;
      }

      main {
        max-width: 1080px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 18px;
        color: #64747c;
      }

      video,
      img {
        display: block;
        width: 100%;
        border: 1px solid #d7e0e4;
        border-radius: 8px;
        background: white;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 20px 0;
      }

      a {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 12px;
        color: #0b5f59;
        border: 1px solid #d7e0e4;
        border-radius: 7px;
        background: white;
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      section {
        margin-top: 24px;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>HIP Beth Review Evidence</h1>
      <p>Live walkthrough recorded from https://eb28.co/HIP/ after the Beth review workflow deploy.</p>
      <div class="links">
        <a href="../">Open HIP App</a>
        <a href="./hip-beth-end-to-end.webm">Download Walkthrough Video</a>
        <a href="./beth-live-final-report.png">Download Final Screenshot</a>
        <a href="./beth-live-report.html">Open Generated Report</a>
        <a href="./beth-live-record.json">Download JSON Record</a>
      </div>
      <section>
        <h2>End-to-End Video</h2>
        <video controls preload="metadata" src="./hip-beth-end-to-end.webm"></video>
      </section>
      <section>
        <h2>Final Report Screenshot</h2>
        <img src="./beth-live-final-report.png" alt="Final Home Inspection Assistant report screenshot" />
      </section>
    </main>
  </body>
</html>
