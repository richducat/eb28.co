name: WeedAuthority
options:
  bundleIdPrefix: co.eb28
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  WeedAuthority:
    type: application
    platform: iOS
    sources:
      - path: WeedAuthority
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.weedauthority.weedauthority
        PRODUCT_NAME: WeedAuthority
        INFOPLIST_FILE: WeedAuthority/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WN3K69XEP4
    info:
      path: WeedAuthority/Info.plist
      properties:
        CFBundleDisplayName: WEED AUTHORITY
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIRequiresFullScreen: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "Weed Authority can use Face ID to quickly unlock your private local rec profile."
schemes:
  WeedAuthority:
    build:
      targets:
        WeedAuthority: all
    run:
      config: Debug
    archive:
      config: Release
