name: CadetCatch
options:
  bundleIdPrefix: co.eb28
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "4"
targets:
  CadetCatch:
    type: application
    platform: iOS
    sources:
      - path: CadetCatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.eb28.cadetcatch
        PRODUCT_NAME: CadetCatch
        INFOPLIST_FILE: CadetCatch/Info.plist
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: WN3K69XEP4
    info:
      path: CadetCatch/Info.plist
      properties:
        CFBundleDisplayName: CadetCatch
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIRequiresFullScreen: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NSPhotoLibraryUsageDescription: "CadetCatch uses selected photos only to register cadets in your private roster."
        ITSAppUsesNonExemptEncryption: false
